services:
  - type: web
    name: nico-senftest-api
    runtime: python
    rootDir: senftest/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DATABASE_URL
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: web
    name: nico-dashboard
    runtime: node
    plan: free
    buildCommand: cd senftest/frontend && npm install
    startCommand: cd senftest/frontend && npm start
    envVars:
      - key: BACKEND_URL
        sync: false
